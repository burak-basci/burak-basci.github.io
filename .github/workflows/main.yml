name: Build and Release APK
on: push
jobs:
  hosting:
    name: Deploy Website
    runs-on: ubuntu-latest
    steps:
      # Checkout Repository
      - uses: actions/checkout@v1

      # Install Flutter command. Version must satisfy pubspec.yaml's
      # `sdk: '>=3.2.6 <4.0.0'`. 3.32.8 ships Dart 3.8.x and is what the
      # working tree builds against locally.
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'
          channel: 'stable'

      # Build Website
      - name: Build Website
        run: |
          flutter config --enable-web
          flutter pub get
          flutter build web --release
        working-directory: ./